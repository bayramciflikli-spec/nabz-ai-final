<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="flow1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(168,85,247,0.3)"/>
      <stop offset="50%" stop-color="rgba(34,211,238,0.2)"/>
      <stop offset="100%" stop-color="rgba(74,222,128,0.3)"/>
    </linearGradient>
    <linearGradient id="flow2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(74,222,128,0.2)"/>
      <stop offset="100%" stop-color="rgba(168,85,247,0.3)"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <path d="M0,200 Q100,100 200,200 T400,200" fill="none" stroke="url(#flow1)" stroke-width="2" opacity="0.6" filter="url(#glow)"/>
  <path d="M0,250 Q150,150 300,250 T400,250" fill="none" stroke="url(#flow2)" stroke-width="1.5" opacity="0.5" filter="url(#glow)"/>
  <path d="M0,150 Q80,200 200,150 T400,150" fill="none" stroke="url(#flow1)" stroke-width="1" opacity="0.4" filter="url(#glow)"/>
  <circle cx="200" cy="200" r="80" fill="none" stroke="url(#flow1)" stroke-width="0.5" opacity="0.3"/>
  <circle cx="200" cy="200" r="120" fill="none" stroke="url(#flow2)" stroke-width="0.5" opacity="0.2"/>
</svg>
